services:
  - type: web
    name: project-relay
    env: node
    plan: free
    region: oregon
    buildCommand: npm run install:all && cd frontend && npm install lightningcss-linux-x64-gnu@1.31.1 --no-save && cd .. && npm run build
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_INCLUDE
        value: optional
      - key: FRONTEND_URL
        value: https://project-relay.onrender.com
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,http://localhost:3001,https://project-relay.onrender.com
    autoDeploy: true
